<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>미라클 주니 19기</title>
    <style>
        /* 스위밍 마일리지 스타일: 크고 선명하게 */
        :root { --main: #FF9F43; --ok: #28C76F; --no: #EA5455; --etc: #82868B; --black: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #F8F9FA; margin: 0; color: var(--black); font-size: 18px; word-break: keep-all; }
        
        .header { background: #222; color: #FF9F43; padding: 20px; text-align: center; font-weight: 900; font-size: 20px; position: sticky; top: 0; z-index: 100; }
        .nav { display: flex; background: #fff; border-bottom: 2px solid #eee; }
        .nav-item { flex: 1; padding: 15px; text-align: center; font-weight: 800; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--main); border-bottom: 4px solid var(--main); }

        .content { padding: 15px; padding-bottom: 100px; }
        
        /* 선택창: 압도적 크기 */
        .select-box { width: 100%; padding: 18px; font-size: 20px; font-weight: 900; border: 3px solid var(--main); border-radius: 15px; margin-bottom: 20px; background: #fff; }

        /* 카드 스타일 (표 아님) */
        .card { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); border: 1px solid #eee; }
        .card-title { font-size: 24px; font-weight: 900; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .badge { font-size: 14px; background: #FFF3E0; color: #E65100; padding: 5px 12px; border-radius: 8px; }

        /* 루틴 항목: 터치하기 편하게 */
        .item { display: flex; flex-direction: column; gap: 12px; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .item-name { font-size: 19px; font-weight: 800; color: #333; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; height: 60px; border-radius: 12px; border: 2px solid #ddd; font-size: 22px; font-weight: 900; background: #fff; color: #ddd; cursor: pointer; transition: 0.1s; }
        
        /* 활성화 상태: 아주 진하게 */
        .btn.O.active { background: var(--ok); color: #fff; border-color: var(--ok); }
        .btn.X.active { background: var(--no); color: #fff; border-color: var(--no); }
        .btn.P.active { background: var(--etc); color: #fff; border-color: var(--etc); }

        /* 관리자용 미니보드 */
        .admin-row { padding: 15px; border-bottom: 1px solid #eee; }
        .admin-name { font-weight: 900; font-size: 18px; margin-bottom: 8px; }
        .admin-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .day-box { font-size: 12px; padding: 5px; border: 1px solid #ddd; text-align: center; border-radius: 5px; font-weight: 700; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 12px 25px; border-radius: 30px; font-size: 16px; font-weight: 700; display: none; z-index: 1000; }
    </style>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>

<div class="header" id="topTimer">미라클 주니 19기 통합센터</div>
<div class="nav">
    <div class="nav-item active" id="tab-member" onclick="showTab('member')">기록하기</div>
    <div class="nav-item" id="tab-admin" onclick="showTab('admin')">현황보기</div>
</div>

<div class="content">
    <div id="section-member">
        <select class="select-box" id="userSelect" onchange="loadUser()">
            <option value="">이름을 선택하세요</option>
        </select>
        <div id="userDetail" style="display:none;">
            <div class="card">
                <div class="card-title">
                    <span id="display-name"></span>
                    <span class="badge" id="display-note"></span>
                </div>
                <div id="routine-list"></div>
            </div>
            <div class="card">
                <div class="card-title">이번 달 성적표 📈</div>
                <div id="stat-info" style="font-size:20px; font-weight:900; color:var(--main); margin-bottom:15px;"></div>
                <div id="mini-grid" style="display:grid; grid-template-columns: repeat(7, 1fr); gap:5px;"></div>
            </div>
        </div>
    </div>

    <div id="section-admin" style="display:none;">
        <div class="card">
            <div class="card-title">멤버별 통합 관리</div>
            <div id="admin-list"></div>
        </div>
    </div>
</div>

<div id="toast">저장 완료!</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbztiOVY2kTQqbL0mQ2iyhq_sB_ukO4w_jUGMfqCzP47XnFzGB8_Dv09I0ewFth1M3U4CA/exec";
    const SID = "1naH8MKtag1s1n9EUXy2xL0dlxq9DqZCIKpEkne32tuU";
    
    const MEMBERS = {
        "곰돌": { items: ["기상시간 5시", "필사", "새벽기도(독서)", "글쓰기"], note: "주말 자유" },
        "글터지기": { items: ["기상시간 5시", "독서", "글쓰기", "산책", "취침 10:30"], note: "일요일 자유" },
        "날위한 나": { items: ["기상시간 6:30", "필사", "글쓰기", "취침 10:30"], note: "주말 자유" },
        "낭만다정": { items: ["기상시간 6시", "독서(운동, 글쓰기)"], note: "평일 실천" },
        "들꽃향기": { items: ["기상시간 6시", "글쓰기", "독서", "스트레칭"], note: "평일 실천" },
        "보름달": { items: ["기상시간 6시", "독서", "필사"], note: "평일 실천" },
        "비채꿈": { items: ["기상시간 5:30", "독서", "필사", "경전 읽기", "글쓰기"], note: "평일 실천" },
        "사랑초": { items: ["기상시간 6시", "독서", "글쓰기", "걷기"], note: "평일 실천" },
        "써니허니": { items: ["기상시간 6시", "독서", "경제 공부", "스트레칭"], note: "평일 실천" },
        "앨리스샘": { items: ["기상시간 4시", "걷기", "글쓰기"], note: "평일 실천" },
        "열정부메랑": { items: ["기상시간 4:30", "운동"], note: "평일 실천" },
        "열정소피아": { items: ["기상시간 4시", "독서", "기도"], note: "" },
        "오빛다": { items: ["기상시간 4시", "영어 공부", "독서", "필사", "걷기"], note: "평일 실천" },
        "윤슬": { items: ["기상시간 6:30", "독서", "글쓰기"], note: "주말 7:30" },
        "즐거운호호씨": { items: ["기상시간 7시", "필사", "말씀"], note: "평일 실천" },
        "지금사랑": { items: ["기상시간 6시", "독서", "식단조절"], note: "평일 실천" },
        "탈렌트수니": { items: ["기상시간 6시", "운동", "독서", "말씀산책"], note: "" },
        "페이페이": { items: ["기상시간 7시", "글쓰기", "운동"], note: "평일 실천" },
        "하니오웰": { items: ["기상시간 6시", "독서", "글쓰기", "걷기"], note: "평일 실천" },
        "mam 마음": { items: ["기상시간 6시", "글쓰기", "걷기"], note: "" },
        "bgmsunny": { items: ["기상시간 5:30", "명상", "스트레칭"], note: "평일 실천" }
    };

    let data = [];
    const today = new Date().toISOString().split('T')[0];

    google.charts.load('current', {packages:['corechart']});
    google.charts.setOnLoadCallback(() => {
        const sel = document.getElementById('userSelect');
        Object.keys(MEMBERS).forEach(m => sel.add(new Option(m, m)));
        fetchData();
        startTimer();
    });

    function fetchData() {
        const q = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Sheet1&v=` + Date.now());
        q.send(res => {
            if (res.isError()) return;
            const t = res.getDataTable();
            data = [];
            for (let i = 0; i < t.getNumberOfRows(); i++) {
                data.push({ date: t.getFormattedValue(i,0), name: t.getValue(i,1), routine: t.getValue(i,2), status: t.getValue(i,3) });
            }
            if(document.getElementById('userSelect').value) loadUser();
            renderAdmin();
        });
    }

    function startTimer() {
        setInterval(() => {
            const now = new Date();
            const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 24, 0, 0);
            const diff = end - now;
            const h = String(Math.floor(diff/3600000)).padStart(2,'0');
            const m = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
            const s = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
            document.getElementById('topTimer').innerText = `⏱ 마감까지 [ ${h}:${m}:${s} ]`;
        }, 1000);
    }

    async function setVal(name, routine, status) {
        // 즉시 반영 (0초 로딩)
        data = data.filter(d => !(d.date.includes(today) && d.name === name && d.routine === routine));
        if(status !== '대기') data.push({ date: today, name, routine, status });
        
        loadUser();
        document.getElementById('toast').style.display = 'block';
        setTimeout(() => document.getElementById('toast').style.display = 'none', 1000);

        // 백그라운드 전송
        fetch(API, { method: 'POST', body: JSON.stringify({ date: today, name, routine, status }) });
    }

    function loadUser() {
        const name = document.getElementById('userSelect').value;
        if(!name) return;
        document.getElementById('userDetail').style.display = 'block';
        document.getElementById('display-name').innerText = name;
        document.getElementById('display-note').innerText = MEMBERS[name].note;

        const list = document.getElementById('routine-list');
        list.innerHTML = "";
        MEMBERS[name].items.forEach(r => {
            const s = getS(name, today, r);
            list.innerHTML += `
                <div class="item">
                    <div class="item-name">${r}</div>
                    <div class="btn-group">
                        <button class="btn O ${s==='O'?'active':''}" onclick="setVal('${name}','${r}','O')">O</button>
                        <button class="btn X ${s==='X'?'active':''}" onclick="setVal('${name}','${r}','X')">X</button>
                        <button class="btn P ${s==='-'?'active':''}" onclick="setVal('${name}','${r}','-')">-</button>
                    </div>
                </div>`;
        });
        renderGrid(name);
    }

    function getS(n, d, r) {
        const found = data.filter(x => x.name == n && x.routine == r && x.date.includes(d));
        return found.length > 0 ? found[found.length - 1].status : '대기';
    }

    function renderGrid(name) {
        const grid = document.getElementById('mini-grid');
        grid.innerHTML = "";
        let oCount = 0;
        for(let i=1; i<=30; i++) {
            const dStr = `2026-04-${String(i).padStart(2,'0')}`;
            const s = getS(name, dStr, MEMBERS[name].items[0]); // 첫번째 루틴 기준 간이 표시
            if(s === 'O') oCount++;
            grid.innerHTML += `<div class="day-box" style="background:${s==='O'?'#28C76F':(s==='X'?'#EA5455':'#fff')}; color:${s==='대기'?'#ccc':'#fff'}">${i}</div>`;
        }
        document.getElementById('stat-info').innerText = `4월 성취일수: ${oCount}일`;
    }

    function renderAdmin() {
        const alist = document.getElementById('admin-list');
        alist.innerHTML = "";
        Object.keys(MEMBERS).forEach(name => {
            const s = getS(name, today, MEMBERS[name].items[0]);
            alist.innerHTML += `
                <div class="admin-row" onclick="quickAdmin('${name}')">
                    <div class="admin-name">${name} <small style="color:#888">${MEMBERS[name].note}</small></div>
                    <div style="font-weight:800; color:${s==='O'?'#28C76F':'#EA5455'}">오늘 상태: ${s}</div>
                </div>`;
        });
    }

    function quickAdmin(name) {
        document.getElementById('userSelect').value = name;
        showTab('member');
        loadUser();
    }

    function showTab(m) {
        document.getElementById('section-member').style.display = m==='member'?'block':'none';
        document.getElementById('section-admin').style.display = m==='admin'?'block':'none';
        document.getElementById('tab-member').classList.toggle('active', m==='member');
        document.getElementById('tab-admin').classList.toggle('active', m==='admin');
    }
</script>
</body>
</html>
