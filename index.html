<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>미라클 주니 19기 통합센터</title>
    <style>
        :root { --main: #D35400; --ok: #28C76F; --no: #EA5455; --etc: #82868B; --black: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #F8F9FA; margin: 0; color: var(--black); line-height: 1.5; }
        
        .header { background: #222; color: #F1C40F; padding: 20px; text-align: center; font-weight: 900; font-size: 18px; position: sticky; top: 0; z-index: 100; }
        .nav { display: flex; background: #fff; border-bottom: 2px solid #eee; }
        .nav-item { flex: 1; padding: 15px; text-align: center; font-weight: 800; color: #888; cursor: pointer; font-size: 16px; }
        .nav-item.active { color: var(--main); border-bottom: 4px solid var(--main); }

        .content { padding: 15px; padding-bottom: 100px; }
        .select-box { width: 100%; padding: 15px; font-size: 18px; font-weight: 900; border: 3px solid var(--main); border-radius: 12px; margin-bottom: 20px; background: #fff; }

        .card { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .card-title { font-size: 20px; font-weight: 900; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #f9f9f9; padding-bottom: 10px; }
        
        .item { display: flex; flex-direction: column; gap: 10px; padding: 15px 0; border-bottom: 1px solid #f5f5f5; }
        .item-name { font-size: 18px; font-weight: 800; color: #333; }
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; height: 55px; border-radius: 10px; border: 1px solid #ddd; font-size: 20px; font-weight: 900; background: #fff; color: #ccc; cursor: pointer; }
        .btn.O.active { background: var(--ok); color: #fff; border-color: var(--ok); }
        .btn.X.active { background: var(--no); color: #fff; border-color: var(--no); }
        .btn.P.active { background: var(--etc); color: #fff; border-color: var(--etc); }

        .grid-container { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 10px; }
        .day-cell { aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; border: 1px solid #eee; cursor: pointer; background: #fff; }
        .day-num { font-size: 14px; margin-bottom: 2px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; }

        .admin-table-wrapper { overflow-x: auto; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 900px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 8px 2px; text-align: center; font-weight: 700; height: 40px; }
        th { background: #f8f8f8; position: sticky; top: 0; z-index: 10; }
        .sticky-col { position: sticky; left: 0; background: #fff; z-index: 5; border-right: 2px solid var(--main) !important; width: 60px; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; }
        .modal-body { background: #fff; width: 90%; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 25px; border-radius: 30px; font-size: 14px; display: none; z-index: 20000; }
    </style>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>

<div class="header" id="topTimer">미라클 주니 19기 통합센터</div>
<div class="nav">
    <div class="nav-item active" id="tab-member" onclick="showTab('member')">나의 기록</div>
    <div class="nav-item" id="tab-admin" onclick="showTab('admin')">관리자 대시보드</div>
</div>

<div class="content">
    <div id="section-member">
        <select class="select-box" id="userSelect" onchange="loadUser()">
            <option value="">이름을 선택하세요</option>
        </select>
        <div id="userDetail" style="display:none;">
            <div class="card">
                <div class="card-title"><span id="display-name"></span> <span id="display-rate" style="color:var(--main); font-size:16px;"></span></div>
                <div id="routine-list"></div>
            </div>
            <div class="card">
                <div class="card-title">4월 상세 기록 (날짜 클릭) 📅</div>
                <div class="grid-container" id="mini-grid"></div>
            </div>
        </div>
    </div>

    <div id="section-admin" style="display:none;">
        <div class="card" style="padding:10px;">
            <div class="card-title">전체 멤버 수정 보드</div>
            <div class="admin-table-wrapper">
                <table id="admin-table"></table>
            </div>
        </div>
    </div>
</div>

<div id="modal">
    <div class="modal-body">
        <h2 id="modal-date" style="margin-top:0; border-bottom:2px solid #eee; padding-bottom:10px;"></h2>
        <div id="modal-content" style="margin:20px 0;"></div>
        <button onclick="closeModal()" style="width:100%; padding:15px; background:var(--main); color:#fff; border:none; border-radius:12px; font-weight:900; font-size:18px;">닫기</button>
    </div>
</div>

<div id="toast">저장 중...</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbztiOVY2kTQqbL0mQ2iyhq_sB_ukO4w_jUGMfqCzP47XnFzGB8_Dv09I0ewFth1M3U4CA/exec";
    const SID = "1naH8MKtag1s1n9EUXy2xL0dlxq9DqZCIKpEkne32tuU";
    
    const MEMBERS = {
        "곰돌": { items: ["기상시간 5시", "필사", "새벽기도(독서)", "글쓰기"], note: "주말 자유" },
        "글터지기": { items: ["기상시간 5시", "독서", "글쓰기", "산책", "취침 10:30"], note: "일요일 자유" },
        "날위한 나": { items: ["기상시간 6:30", "필사", "글쓰기", "취침 10:30"], note: "주말 자유" },
        "낭만다정": { items: ["기상시간 6시", "독서(운동, 글쓰기)"], note: "평일 실천" },
        "들꽃향기": { items: ["기상시간 6시", "글쓰기", "독서", "스트레칭"], note: "평일 실천" },
        "보름달": { items: ["기상시간 6시", "독서", "필사"], note: "평일 실천" },
        "비채꿈": { items: ["기상시간 5:30", "독서", "필사", "경전 읽기", "글쓰기"], note: "평일 실천" },
        "사랑초": { items: ["기상시간 6시", "독서", "글쓰기", "걷기"], note: "평일 실천" },
        "써니허니": { items: ["기상시간 6시", "독서", "경제 공부", "스트레칭"], note: "평일 실천" },
        "앨리스샘": { items: ["기상시간 4시", "걷기", "글쓰기"], note: "평일 실천" },
        "열정부메랑": { items: ["기상시간 4:30", "운동"], note: "평일 실천" },
        "열정소피아": { items: ["기상시간 4시", "독서", "기도"], note: "" },
        "오빛다": { items: ["기상시간 4시", "영어 공부", "독서", "필사", "걷기"], note: "평일 실천" },
        "윤슬": { items: ["기상시간 6:30", "독서", "글쓰기"], note: "주말 7:30" },
        "즐거운호호씨": { items: ["기상시간 7시", "필사", "말씀"], note: "평일 실천" },
        "지금사랑": { items: ["기상시간 6시", "독서", "식단조절"], note: "평일 실천" },
        "탈렌트수니": { items: ["기상시간 6시", "운동", "독서", "말씀산책"], note: "" },
        "페이페이": { items: ["기상시간 7시", "글쓰기", "운동"], note: "평일 실천" },
        "하니오웰": { items: ["기상시간 6시", "독서", "글쓰기", "걷기"], note: "평일 실천" },
        "mam 마음": { items: ["기상시간 6시", "글쓰기", "걷기"], note: "" },
        "bgmsunny": { items: ["기상시간 5:30", "명상", "스트레칭"], note: "평일 실천" }
    };

    let db = [];
    const today = new Date().toISOString().split('T')[0];

    google.charts.load('current', {packages:['corechart']});
    google.charts.setOnLoadCallback(() => {
        const sel = document.getElementById('userSelect');
        Object.keys(MEMBERS).forEach(m => sel.add(new Option(m, m)));
        fetchData();
        setInterval(updateTimer, 1000);
    });

    function fetchData() {
        const q = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Sheet1&v=` + Date.now());
        q.send(res => {
            if (res.isError()) return;
            const t = res.getDataTable();
            db = [];
            for (let i = 0; i < t.getNumberOfRows(); i++) {
                db.push({ date: t.getFormattedValue(i,0), name: t.getValue(i,1), routine: t.getValue(i,2), status: t.getValue(i,3) });
            }
            if(document.getElementById('userSelect').value) loadUser();
            renderAdmin();
        });
    }

    function updateTimer() {
        const now = new Date();
        const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 24, 0, 0);
        const diff = end - now;
        const h = String(Math.floor(diff/3600000)).padStart(2,'0');
        const m = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
        const s = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
        document.getElementById('topTimer').innerText = `⏱ 마감까지 [ ${h}:${m}:${s} ]`;
    }

    async function updateData(name, routine, status, targetDate) {
        db = db.filter(d => !(d.date.includes(targetDate) && d.name === name && d.routine === routine));
        if(status !== '대기') db.push({ date: targetDate, name, routine, status });
        
        loadUser();
        renderAdmin();
        showToast("저장 중...");
        
        try {
            await fetch(API, { method: 'POST', body: JSON.stringify({ date: targetDate, name, routine, status }) });
            showToast("성공!");
        } catch(e) { showToast("실패!"); }
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 1000);
    }

    function getS(n, d, r) {
        const found = db.filter(x => x.name == n && x.routine == r && x.date.includes(d));
        return found.length > 0 ? found[found.length - 1].status : '대기';
    }

    function loadUser() {
        const name = document.getElementById('userSelect').value;
        if(!name) return;
        document.getElementById('userDetail').style.display = 'block';
        document.getElementById('display-name').innerText = `👋 ${name}님`;

        const list = document.getElementById('routine-list');
        list.innerHTML = "";
        MEMBERS[name].items.forEach(r => {
            const s = getS(name, today, r);
            list.innerHTML += `
                <div class="item">
                    <div class="item-name">${r}</div>
                    <div class="btn-group">
                        <button class="btn O ${s==='O'?'active':''}" onclick="updateData('${name}','${r}','O','${today}')">O</button>
                        <button class="btn X ${s==='X'?'active':''}" onclick="updateData('${name}','${r}','X','${today}')">X</button>
                        <button class="btn P ${s==='-'?'active':''}" onclick="updateData('${name}','${r}','-','${today}')">-</button>
                    </div>
                </div>`;
        });
        renderGrid(name);
    }

    function renderGrid(name) {
        const grid = document.getElementById('mini-grid');
        grid.innerHTML = "";
        let oCount = 0, pCount = 0;
        const curDay = new Date().getDate();

        for(let i=1; i<=30; i++) {
            const dStr = `2026-04-${String(i).padStart(2,'0')}`;
            let dO = 0, dP = 0;
            MEMBERS[name].items.forEach(r => {
                const s = getS(name, dStr, r);
                if(s === 'O') dO++; if(s === '-') dP++;
            });
            if(i <= curDay) { oCount += dO; pCount += dP; }

            const color = dO === MEMBERS[name].items.length ? '#28C76F' : (dO > 0 ? '#F1C40F' : '#fff');
            grid.innerHTML += `
                <div class="day-cell" style="background:${color}" onclick="openModal('${name}','${dStr}')">
                    <span class="day-num">${i}</span>
                    <div class="status-dot" style="background:${dO>0?'#fff':'#ccc'}"></div>
                </div>`;
        }
        const total = (curDay * MEMBERS[name].items.length) - pCount;
        document.getElementById('display-rate').innerText = `성취율: ${total > 0 ? Math.round((oCount/total)*100) : 0}%`;
    }

    function openModal(name, date) {
        document.getElementById('modal-date').innerText = `${date} 기록`;
        let html = '';
        MEMBERS[name].items.forEach(r => {
            const s = getS(name, date, r);
            html += `<div style="padding:15px 0; border-bottom:1px solid #f0f0f0; font-size:18px; font-weight:800;">
                        ${r} : <span style="color:${s==='O'?'#28C76F':(s==='X'?'#EA5455':'#888')}">${s}</span>
                     </div>`;
        });
        document.getElementById('modal-content').innerHTML = html;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function renderAdmin() {
        const table = document.getElementById('admin-table');
        let html = '<thead><tr><th class="sticky-col">멤버</th><th>항목</th>';
        for(let i=1; i<=30; i++) html += `<th>${i}</th>`;
        html += '</tr></thead><tbody>';

        Object.keys(MEMBERS).forEach(name => {
            MEMBERS[name].items.forEach((r, idx) => {
                html += `<tr>`;
                if(idx===0) html += `<td class="sticky-col" rowspan="${MEMBERS[name].items.length}">${name}</td>`;
                html += `<td style="text-align:left;">${r}</td>`;
                for(let i=1; i<=30; i++) {
                    const dStr = `2026-04-${String(i).padStart(2,'0')}`;
                    const s = getS(name, dStr, r);
                    const next = s==='O'?'X':(s==='X'?'-':(s==='-'?'대기':'O'));
                    html += `<td onclick="updateData('${name}','${r}','${next}','${dStr}')" style="cursor:pointer; color:${s==='O'?'#28C76F':(s==='X'?'#EA5455':'#888')}">${s==='대기'?'':s}</td>`;
                }
                html += `</tr>`;
            });
        });
        table.innerHTML = html;
    }

    function showTab(m) {
        if(m === 'admin') {
            if(prompt("관리자 비밀번호") !== "4120") return;
        }
        document.getElementById('section-member').style.display = m==='member'?'block':'none';
        document.getElementById('section-admin').style.display = m==='admin'?'block':'none';
        document.querySelectorAll('.nav-item').forEach((t, i) => t.classList.toggle('active', (m==='member'&&i===0)||(m==='admin'&&i===1)));
    }
</script>
</body>
</html>
