<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>미라클 주니 20기 완결판</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --main: #FF9F43; --ok: #28C76F; --no: #EA5455; --etc: #82868B; --bg: #FFF9F2; --streak: #FF4757; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background: var(--bg); margin: 0; color: #333; line-height: 1.5; }
        .header { background: #343A40; color: #F1C40F; padding: 12px; text-align: center; font-weight: 800; font-size: 13px; position: sticky; top: 0; z-index: 1000; }
        
        /* 명언 카드 스타일 업그레이드 */
        .quote-area { background: #FFF9E6; border: 2px solid #F1C40F; border-radius: 15px; margin: 15px; padding: 25px 15px; text-align: center; box-shadow: 0 4px 15px rgba(241, 196, 15, 0.2); position: relative; }
        .quote-text { font-size: 17px; font-weight: 800; color: #5D4037; word-break: keep-all; line-height: 1.5; position: relative; z-index: 1; }
        .quote-author { font-size: 12px; color: #795548; margin-top: 10px; font-weight: 600; }
        .quote-area::before { content: "“"; position: absolute; top: 5px; left: 15px; font-size: 40px; color: #F1C40F; opacity: 0.4; }

        .nav { display: flex; gap: 8px; padding: 10px; background: #fff; }
        .nav-item { flex: 1; padding: 12px; text-align: center; font-weight: 800; border-radius: 10px; background: #E9ECEF; color: #495057; border: none; font-size: 13px; }
        .nav-item.active { background: var(--main); color: #fff; box-shadow: 0 4px 10px rgba(255,159,67,0.3); }
        .content { padding: 15px; padding-bottom: 60px; }
        .select-box { width: 100%; padding: 15px; font-size: 16px; font-weight: 800; border: 2px solid var(--main); border-radius: 12px; margin-bottom: 15px; background: #fff; }
        
        .card { background: #fff; border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid #FFE0B2; }
        
        /* 이름과 스트릭 배치 수정 */
        .user-header { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .welcome-text { font-size: 20px; font-weight: 900; margin: 0; }
        .streak-badge { background: #FFF0F0; color: var(--streak); padding: 4px 10px; border-radius: 8px; font-size: 13px; font-weight: 800; }
        
        .rule-badge { background: #FFF3E0; color: #E65100; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; border: 1px solid #FFCC80; display: inline-block; margin-bottom: 15px; }
        
        .item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .item-name { font-size: 15px; font-weight: 700; flex: 1; }
        .btn-group { display: flex; gap: 5px; }
        .btn { width: 42px; height: 42px; border-radius: 8px; border: 1px solid #eee; font-size: 15px; font-weight: 900; background: #fff; color: #ccc; }
        .btn.O.active { background: var(--ok); color: #fff; border-color: var(--ok); }
        .btn.X.active { background: var(--no); color: #fff; border-color: var(--no); }
        .btn.P.active { background: var(--etc); color: #fff; border-color: var(--etc); }
        
        .grid-container { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-cell { aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; border: 1px solid #eee; background: #fff; }
        
        /* 관리자 테이블 스타일 */
        .admin-wrapper { overflow: auto; max-height: 70vh; border: 1px solid var(--main); border-radius: 10px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 11px; min-width: 1500px; }
        th, td { border: 1px solid #FFE0B2; padding: 8px 3px; text-align: center; }
        thead th { position: sticky; top: 0; background: #FFF8E1; z-index: 10; }
        .sticky-name { position: sticky; left: 0; background: #FFFDE7 !important; z-index: 20; border-right: 2px solid var(--main); }
        .sat { color: #2980b9 !important; background: #EBF5FB; } /* 토요일 */
        .sun { color: #e74c3c !important; background: #FDEDEC; } /* 일요일/공휴일 */
        .rate-col { font-weight: 900; color: #2C3E50; background: #F4F6F7; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 20px; border-radius: 25px; font-size: 13px; display: none; z-index: 3000; width: 80%; text-align: center; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-body { background: #fff; width: 85%; border-radius: 20px; padding: 25px; max-width: 400px; }
    </style>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>

<div class="header" id="topTimer">기록 마감까지 [ 00:00:00 ]</div>
<div class="quote-area">
    <div class="quote-text" id="quote-text">말하기를 멈추고, 행동하기 시작하라.</div>
    <div class="quote-author" id="quote-author">- 월트 디즈니 -</div>
</div>

<div class="nav">
    <button class="nav-item active" id="btn-mem" onclick="showTab('member')">🙋‍♂️ 20기 멤버 인증</button>
    <button class="nav-item" id="btn-adm" onclick="showTab('admin')">👑 관리 대시보드</button>
</div>

<div class="content">
    <div id="sec-member">
        <select class="select-box" id="userSelect" onchange="loadUser()">
            <option value="">-- 성함을 선택하세요 --</option>
        </select>
        <div id="userArea" style="display:none;">
            <div class="card">
                <div class="user-header">
                    <div class="welcome-text">👋 <span id="span-name"></span>님!</div>
                    <div id="streak-area" class="streak-badge"></div>
                </div>
                <div id="div-rule" class="rule-badge"></div>
                <div id="routine-list"></div>
                <div id="user-rate" style="text-align:right; font-weight:900; color:var(--main); margin-top:10px; font-size:14px;"></div>
            </div>
            <div class="card">
                <div style="font-size: 16px; font-weight: 900; margin-bottom:10px;">📅 나의 5월 루틴 달력</div>
                <div id="mini-grid" class="grid-container"></div>
            </div>
        </div>
    </div>

    <div id="sec-admin" style="display:none;">
        <button class="nav-item active" style="width:100%; margin-bottom:10px;" onclick="downloadAdminImage()">📸 현황 이미지 저장</button>
        <div class="card" id="admin-capture-area" style="padding:10px;">
            <div style="text-align:center; font-size:16px; font-weight:900; color:var(--main); margin-bottom:10px;">📊 20기 실시간 통합 현황</div>
            <div class="admin-wrapper"><table id="admin-table"></table></div>
        </div>
    </div>
</div>

<div id="modal" onclick="closeModal()"><div class="modal-body" onclick="event.stopPropagation()"><h3 id="modal-date"></h3><div id="modal-content"></div><button onclick="closeModal()" style="width:100%; padding:15px; background:var(--main); color:#fff; border:none; border-radius:10px; margin-top:20px; font-weight:bold;">닫기</button></div></div>
<div id="toast"></div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbztiOVY2kTQqbL0mQ2iyhq_sB_ukO4w_jUGMfqCzP47XnFzGB8_Dv09I0ewFth1M3U4CA/exec";
    const SID = "1naH8MKtag1s1n9EUXy2xL0dlxq9DqZCIKpEkne32tuU";
    const HOLIDAYS = ['2026-05-05', '2026-05-25']; // 어린이날, 부처님오신날 대체공휴일
    const WEEKS = ['일','월','화','수','목','금','토'];
    
    // 명언 및 응원 메시지 데이터 (이전과 동일)
    const QUOTES = { 1:["말하기를 멈추고, 행동하기 시작하라.","월트 디즈니"], /* ... 생략 ... */ 31:["당신은 이미 기적의 주인공입니다!","미라클 주니"] };
    const CHEERS = ["소중한 기록 감사합니다. 오늘이 반짝이는 순간들로 가득하길 바라요. ✨","작은 실천이 모여 큰 기적을 만듭니다. 정말 잘하고 계세요! 👍","와우! 열정이 대시보드를 활활 태우고 있네요! 🔥","오늘의 기록이 훗날 빛날 증거가 될 거예요. 💎","'우리'라서 해낼 수 있어요. 끝까지 함께해요! 🤝"];

    const MEMBERS = {
        "곰돌": { items: ["기상시간 5시", "필사", "새벽기도(독서)", "글쓰기"], note: "주말 기상 자유" },
        "글터지기": { items: ["기상시간 5시", "독서", "글쓰기", "산책 (주3회)", "취침 10:30분 이전"], note: "일요일 자유" },
        "날위한나": { items: ["기상시간 6시30분", "아침필사", "글쓰기", "취침시간 11시 이전"], note: "" },
        "낭만다정": { items: ["기상시간 6시", "독서(운동, 글쓰기)"], note: "주말 루틴 자유" },
        "들꽃향기": { items: ["기상시간 6시", "글쓰기", "독서", "스트레칭(걷기)", "취침 10:30분 이전"], note: "주말 루틴 자유" },
        "보름달": { items: ["기상시간 6시", "독서", "필사"], note: "주말 루틴 자유" },
        "비채꿈": { items: ["기상시간 5시30분", "독서", "필사", "경전 읽기", "글쓰기"], note: "주말 루틴 자유" },
        "사랑초": { items: ["기상시간 6시", "독서", "글쓰기", "걷기(수영)"], note: "주말 루틴 자유" },
        "써니허니": { items: ["기상시간 6시", "독서", "공부", "스트레칭, 명상"], note: "주말 루틴 자유" },
        "아테네": { items: ["기상시간 6시", "운동", "명상", "독서"], note: "" },
        "안젤라 두보": { items: ["기상시간 6시", "양치, 긍정확언", "달리기", "독서", "다이어리 쓰기"], note: "일요일 루틴 자유" },
        "앨리스샘": { items: ["기상시간 4시", "걷기(달리기)", "글쓰기(독서)"], note: "주말 루틴 자유" },
        "열정부메랑": { items: ["기상시간 4시30분", "운동(헬스)"], note: "주말 루틴 자유" },
        "열정소피아": { items: ["기상시간 4시", "독서", "새벽기도", "스트레칭"], note: "" },
        "오빛다": { items: ["기상시간 4시", "영어 공부&리딩", "독서", "필사", "걷기"], note: "주말 루틴 자유" },
        "오시연": { items: ["기상시간 6시", "스트레칭, 간단한 운동"], note: "" },
        "윤슬": { items: ["기상시간 6시30분", "독서", "글쓰기"], note: "주말 기상 7:30" },
        "즐거운호호씨": { items: ["기상시간 7시", "필사", "말씀"], note: "주말(연휴) 루틴 자유" },
        "지금사랑": { items: ["기상시간 6시", "독서", "식단조절"], note: "주말 루틴 자유" },
        "탈렌트수니": { items: ["기상시간 6시", "걷기(달리기)", "독서", "말씀산책"], note: "" },
        "하니오웰": { items: ["기상시간 6시", "독서", "글쓰기"], note: "주말 루틴 자유" },
        "mam 마음": { items: ["기상시간 6시", "글쓰기", "걷기"], note: "" },
        "bgmsunny": { items: ["기상시간 5시30분", "명상", "스트레칭(요가)"], note: "" },
        "사랑주니": { items: ["기상시간 4시", "명상&스트레칭", "글쓰기", "독서", "달리기(걷기)"], note: "운영자 루틴" }
    };

    let db = [];
    function getKST() { return new Date(new Date().getTime() + (9*60*60*1000)); }
    function getKSTStr(d = getKST()) { return d.toISOString().split('T')[0]; }

    google.charts.load('current', {packages:['corechart']});
    google.charts.setOnLoadCallback(() => {
        const sel = document.getElementById('userSelect');
        Object.keys(MEMBERS).sort().forEach(m => sel.add(new Option(m, m)));
        const d = getKST().getDate();
        if(QUOTES[d]) {
            document.getElementById('quote-text').innerText = QUOTES[d][0];
            document.getElementById('quote-author').innerText = `- ${QUOTES[d][1]} -`;
        }
        fetchData();
        setInterval(tick, 1000);
    });

    function fetchData() {
        const q = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=기록&v=${Date.now()}`);
        q.send(res => {
            if (res.isError()) return;
            const t = res.getDataTable();
            db = [];
            for (let i = 0; i < t.getNumberOfRows(); i++) {
                db.push({ date: t.getFormattedValue(i,0), name: t.getValue(i,1), routine: t.getValue(i,2), status: t.getValue(i,3) });
            }
            if(document.getElementById('userSelect').value) loadUser();
            renderAdmin();
        });
    }

    function tick() {
        const n = new Date();
        const e = new Date(n.getFullYear(), n.getMonth(), n.getDate(), 24, 0, 0);
        const d = e - n;
        const h = String(Math.floor(d/3600000)).padStart(2,'0'), m = String(Math.floor((d%3600000)/60000)).padStart(2,'0'), s = String(Math.floor((d%60000)/1000)).padStart(2,'0');
        document.getElementById('topTimer').innerText = `⏱ 20기 기록 마감까지 [ ${h}:${m}:${s} ]`;
    }

    function loadUser() {
        const name = document.getElementById('userSelect').value;
        if(!name) return;
        const todayStr = getKSTStr(), now = getKST();
        document.getElementById('userArea').style.display = 'block';
        document.getElementById('span-name').innerText = name;
        document.getElementById('div-rule').innerText = `📍 개인 수칙: ${MEMBERS[name].note || "없음"}`;
        
        let streak = 0, checkDate = new Date(now);
        while(true) {
            const dS = getKSTStr(checkDate);
            if(dS.split('-')[1] !== '05') break;
            if(MEMBERS[name].items.some(r => getS(name, dS, r) === 'O')) { streak++; checkDate.setDate(checkDate.getDate()-1); }
            else break;
        }
        document.getElementById('streak-area').innerHTML = streak > 0 ? `🔥 연속 기록 ${streak}일째!` : `🌱 오늘부터 기록을 시작해봐요!`;

        const list = document.getElementById('routine-list');
        list.innerHTML = "";
        let done = 0;
        MEMBERS[name].items.forEach(r => {
            const s = getS(name, todayStr, r);
            if(s === 'O') done++;
            list.innerHTML += `<div class="item"><div class="item-name">${r}</div><div class="btn-group">
                <button class="btn O ${s==='O'?'active':''}" onclick="save('${name}','${r}','O')">O</button>
                <button class="btn X ${s==='X'?'active':''}" onclick="save('${name}','${r}','X')">X</button>
                <button class="btn P ${s==='-'?'active':''}" onclick="save('${name}','${r}','-')">-</button>
            </div></div>`;
        });
        document.getElementById('user-rate').innerText = `오늘 성취율: ${Math.round((done/MEMBERS[name].items.length)*100)}%`;
        renderGrid(name);
    }

    function getS(n, d, r) {
        const f = db.filter(x => x.name == n && x.routine == r && x.date.includes(d));
        return f.length > 0 ? f[f.length-1].status : '대기';
    }

    async function save(name, routine, status, date = getKSTStr()) {
        db = db.filter(x => !(x.date.includes(date) && x.name === name && x.routine === routine));
        if(status !== '대기') db.push({ date, name, routine, status });
        loadUser(); renderAdmin();
        const t = document.getElementById('toast');
        t.innerText = CHEERS[Math.floor(Math.random()*5)]; t.style.display = 'block';
        setTimeout(()=>t.style.display='none', 2500);
        fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ date, name, routine, status }) });
    }

    function renderAdmin() {
        const table = document.getElementById('admin-table');
        let h = '<thead><tr><th class="sticky-name" rowspan="2">멤버</th><th rowspan="2">루틴</th>';
        for(let i=1; i<=31; i++) {
            const dObj = new Date(2026, 4, i);
            const w = WEEKS[dObj.getDay()];
            const dS = `2026-05-${String(i).padStart(2,'0')}`;
            const isSun = dObj.getDay() === 0 || HOLIDAYS.includes(dS);
            const isSat = dObj.getDay() === 6;
            h += `<th class="${isSun?'sun':(isSat?'sat':'')}">${i}<br>(${w})</th>`;
        }
        h += '<th rowspan="2" class="rate-col">성취율</th></tr></thead><tbody>';

        Object.keys(MEMBERS).sort().forEach(name => {
            let totalPossible = 0, totalDone = 0;
            MEMBERS[name].items.forEach((r, idx) => {
                h += `<tr>`;
                if(idx===0) h += `<td class="sticky-name" rowspan="${MEMBERS[name].items.length}">${name}</td>`;
                h += `<td style="text-align:left;">${r}</td>`;
                for(let i=1; i<=31; i++) {
                    const dS = `2026-05-${String(i).padStart(2,'0')}`, s = getS(name, dS, r);
                    const dObj = new Date(2026, 4, i);
                    const isSun = dObj.getDay() === 0 || HOLIDAYS.includes(dS);
                    const isSat = dObj.getDay() === 6;
                    if(s==='O') { totalDone++; totalPossible++; } else if(s==='X') { totalPossible++; }
                    h += `<td class="${isSun?'sun':(isSat?'sat':'')}" style="font-weight:bold; color:${s==='O'?'#28C76F':(s==='X'?'#EA5455':'#888')}">${s==='대기'?'':(s==='-'?'P':s)}</td>`;
                }
                if(idx===0) h += `<td class="rate-col" rowspan="${MEMBERS[name].items.length}" id="rate-${name}">0%</td>`;
                h += `</tr>`;
            });
            setTimeout(() => {
                const rateEl = document.getElementById(`rate-${name}`);
                if(rateEl) {
                    const rate = totalPossible === 0 ? 0 : Math.round((totalDone/totalPossible)*100);
                    rateEl.innerText = rate + '%';
                }
            }, 100);
        });
        table.innerHTML = h + '</tbody>';
    }

    function renderGrid(name) {
        const grid = document.getElementById('mini-grid'); grid.innerHTML = "";
        for(let i=1; i<=31; i++) {
            const dS = `2026-05-${String(i).padStart(2,'0')}`, dObj = new Date(2026, 4, i);
            let dO = 0, dInput = 0;
            MEMBERS[name].items.forEach(r => { const s = getS(name, dS, r); if(s === 'O') dO++; if(s !== '대기') dInput++; });
            let color = '#fff'; if(dInput > 0) color = (dO === MEMBERS[name].items.length) ? '#28C76F' : '#F1C40F';
            const isSun = dObj.getDay() === 0 || HOLIDAYS.includes(dS);
            const isSat = dObj.getDay() === 6;
            grid.innerHTML += `<div class="day-cell ${isSun?'sun':(isSat?'sat':'')}" style="background:${color}" onclick="openModal('${name}','${dS}')">${i}</div>`;
        }
    }

    function openModal(name, date) {
        document.getElementById('modal-date').innerText = `${date} 상세`;
        let h = ''; MEMBERS[name].items.forEach(r => { const s = getS(name, date, r); h += `<p style="border-bottom:1px solid #eee; padding:8px 0;">${r}: <b>${s==='대기'?'미입력':s}</b></p>`; });
        document.getElementById('modal-content').innerHTML = h; document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function showTab(m) {
        if(m === 'admin' && prompt("관리자 비번?") !== "4120") return;
        document.getElementById('sec-member').style.display = m==='member'?'block':'none';
        document.getElementById('sec-admin').style.display = m==='admin'?'block':'none';
        document.getElementById('btn-mem').classList.toggle('active', m==='member');
        document.getElementById('btn-adm').classList.toggle('active', m==='admin');
    }
    function downloadAdminImage() {
        const area = document.getElementById('admin-capture-area');
        html2canvas(area, { scale: 2 }).then(canvas => {
            const a = document.createElement('a'); a.download = `미라클주니_20기_현황.png`;
            a.href = canvas.toDataURL(); a.click();
        });
    }
</script>
