<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>미라클 주니 19기 통합 센터</title>
    <style>
        /* 가독성 중심의 진한 컬러셋 */
        :root { --primary: #F1C40F; --point: #D35400; --success: #27AE60; --fail: #C0392B; --pass: #7F8C8D; --bg: #FFFFFF; --text: #000000; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); padding: 10px; color: var(--text); line-height: 1.4; }
        .container { max-width: 100%; margin: 0 auto; }
        
        /* 배너 및 탭: 크고 선명하게 */
        .timer-banner { background: #222; color: #F1C40F; text-align: center; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-weight: 800; font-size: 16px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 18px 10px; border-radius: 10px; border: 1px solid #ddd; background: #f8f8f8; font-weight: 800; font-size: 15px; cursor: pointer; color: #444; }
        .tab.active { background: var(--point); color: white; border-color: var(--point); }

        /* 카드 및 폰트 크기 대폭 상향 */
        .card { background: white; padding: 20px; border-radius: 15px; border: 2px solid #eee; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { font-size: 22px; margin-bottom: 15px; font-weight: 900; }
        label { font-size: 18px; font-weight: 800; display: block; margin-bottom: 10px; }
        select { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--point); font-size: 18px; font-weight: 800; background: #fff; }

        /* 루틴 아이템: 스위밍 마일리지처럼 시원하게 */
        .routine-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 2px solid #f9f9f9; }
        .routine-name { font-size: 18px; font-weight: 800; color: #222; flex: 1; }
        
        /* 버튼: 더 크고 즉각적인 클릭감 */
        .btn-group { display: flex; gap: 8px; }
        .btn { width: 55px; height: 55px; border-radius: 10px; border: 2px solid #ddd; cursor: pointer; font-weight: 900; font-size: 20px; background: #fff; transition: all 0.1s; }
        .btn.O.active { background: var(--success); color: white; border-color: var(--success); }
        .btn.X.active { background: var(--fail); color: white; border-color: var(--fail); }
        .btn.P.active { background: var(--pass); color: white; border-color: var(--pass); }
        
        /* 상세 표: 글자 진하게 및 가로 스크롤 안내 */
        .detail-table-wrapper { overflow-x: auto; margin-top: 15px; border: 1px solid #eee; }
        .detail-table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 400px; }
        .detail-table th, .detail-table td { border: 1px solid #ddd; padding: 12px 5px; text-align: center; color: #000; font-weight: 700; }
        .detail-table th { background: #f0f0f0; font-weight: 800; }

        /* 관리자 표: 시인성 강화 */
        .admin-area { overflow-x: auto; padding: 5px; }
        .main-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1000px; }
        .main-table th, .main-table td { border: 1px solid #bbb; padding: 10px 4px; text-align: center; color: #000; font-weight: 700; }
        .main-table th { background: #eee; font-weight: 800; }
        .sticky-col { position: sticky; left: 0; background: #fff; z-index: 5; border-right: 2px solid #000 !important; font-weight: 800; }
        
        /* 토스트 알림 (로딩 대신 잠깐 뜨는 메시지) */
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; display: none; z-index: 10000; }
    </style>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>

<div id="toast">저장 중...</div>

<div class="container">
    <div class="timer-banner" id="deadlineTimer">로딩 중...</div>
    
    <div class="tabs">
        <button class="tab active" onclick="switchTab('member')">🙋 멤버 인증</button>
        <button class="tab" onclick="switchTab('admin')">👑 관리자용</button>
    </div>

    <div id="memberSection">
        <div class="card">
            <label>본인 이름 선택</label>
            <select id="memberSelect" onchange="loadMemberView()">
                <option value="">-- 성함을 선택하세요 --</option>
            </select>
        </div>
        <div id="memberFocusArea" style="display:none;">
            <div class="card" style="border-top: 6px solid var(--success);">
                <h2 id="focusName" style="margin:0;"></h2>
                <div id="specialNoteArea" style="margin-top:10px;"></div>
                <div id="routineList"></div>
            </div>
            <div class="card">
                <h3 style="font-weight:900;">📅 나의 4월 상세 기록표</h3>
                <p id="myRateInfo" style="font-weight:800; color:var(--point); font-size:16px;"></p>
                <div class="detail-table-wrapper"><table class="detail-table" id="myDetailTable"></table></div>
            </div>
        </div>
    </div>

    <div id="adminSection" style="display:none;">
        <div class="card" style="padding:10px;">
            <h2 style="text-align:center;">📊 4월 통합 현황 (실시간)</h2>
            <div class="admin-area"><table id="adminTable" class="main-table"></table></div>
        </div>
    </div>
</div>

<script>
    google.charts.load('current', {packages:['corechart', 'table']});

    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbztiOVY2kTQqbL0mQ2iyhq_sB_ukO4w_jUGMfqCzP47XnFzGB8_Dv09I0ewFth1M3U4CA/exec"; 
    const SPREADSHEET_ID = "1naH8MKtag1s1n9EUXy2xL0dlxq9DqZCIKpEkne32tuU";
    const ADMIN_PW = "4120"; 

    const MEMBER_DATA = {
        "곰돌": { items: ["기상시간 5시", "필사", "새벽기도(독서)", "글쓰기"], note: "주말 기상 자유" },
        "글터지기": { items: ["기상시간 5시", "독서", "글쓰기", "산책 (주3회)", "취침시간 10:30분 이전"], note: "일요일 자유" },
        "날위한 나": { items: ["기상시간 6시30분", "필사", "글쓰기", "취침시간 10:30분 이전"], note: "취침 시간 금,토 자유" },
        "낭만다정": { items: ["기상시간 6시", "독서(운동, 글쓰기)"], note: "평일 실천" },
        "들꽃향기": { items: ["기상시간 6시", "글쓰기", "독서", "스트레칭(걷기)"], note: "평일 실천" },
        "보름달": { items: ["기상시간 6시", "독서", "필사"], note: "평일 실천" },
        "비채꿈": { items: ["기상시간 5시30분", "독서", "필사", "경전 읽기", "글쓰기"], note: "평일 실천" },
        "사랑초": { items: ["기상시간 6시", "독서", "글쓰기", "걷기(수영)"], note: "평일 실천" },
        "써니허니": { items: ["기상시간 6시", "독서", "경제 공부", "스트레칭(요가)"], note: "평일 실천" },
        "앨리스샘": { items: ["기상시간 4시", "걷기(달리기)", "글쓰기(독서)"], note: "평일 실천" },
        "열정부메랑": { items: ["기상시간 4시30분", "운동(헬스)"], note: "평일 실천" },
        "열정소피아": { items: ["기상시간 4시", "독서", "기도"], note: "" },
        "오빛다": { items: ["기상시간 4시", "영어 공부&리딩", "독서", "필사", "걷기"], note: "평일 실천" },
        "윤슬": { items: ["기상시간 6시30분", "독서", "글쓰기"], note: "주말 기상 7시30분" },
        "즐거운호호씨": { items: ["기상시간 7시", "필사", "말씀"], note: "평일 실천" },
        "지금사랑": { items: ["기상시간 6시", "독서", "저녁식사 조절"], note: "평일 실천" },
        "탈렌트수니": { items: ["기상시간 6시", "운동", "독서", "말씀산책"], note: "" },
        "페이페이": { items: ["기상시간 7시", "글쓰기(주 3회)", "운동(주 3회)"], note: "평일 실천" },
        "하니오웰": { items: ["기상시간 6시", "독서", "글쓰기", "걷기(주3회)"], note: "평일 실천" },
        "mam 마음": { items: ["기상시간 6시", "글쓰기", "걷기"], note: "" },
        "bgmsunny": { items: ["기상시간 5시30분", "명상", "스트레칭(요가)"], note: "평일 실천" }
    };

    let db = [];
    const weekDays = ['일', '월', '화', '수', '목', '금', '토'];

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function getNowInfo() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        return { todayStr: `${y}-${m}-${d}`, currentDay: now.getDate() };
    }

    async function init() {
        const select = document.getElementById('memberSelect');
        Object.keys(MEMBER_DATA).forEach(name => select.add(new Option(name, name)));
        updateTimer();
        setInterval(updateTimer, 1000);
        google.charts.setOnLoadCallback(fetchRemoteData);
    }

    function updateTimer() {
        const now = new Date();
        const deadline = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 24, 0, 0);
        let diff = deadline - now;
        if (diff <= 0) { document.getElementById('deadlineTimer').innerHTML = "⏳ 마감되었습니다!"; return; }
        const h = String(Math.floor((diff / (1000 * 60 * 60)) % 24)).padStart(2, '0');
        const m = String(Math.floor((diff / (1000 * 60)) % 60)).padStart(2, '0');
        const s = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');
        document.getElementById('deadlineTimer').innerHTML = `⏱ 마감까지 [ ${h}:${m}:${s} ]`;
    }

    async function fetchRemoteData() {
        const query = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1&cache=` + Date.now());
        query.send(res => {
            if (res.isError()) return;
            const data = res.getDataTable();
            db = [];
            for (let i = 0; i < data.getNumberOfRows(); i++) {
                db.push({ date: data.getFormattedValue(i,0), name: data.getValue(i,1), routine: data.getValue(i,2), status: data.getValue(i,3) });
            }
            renderAdminTable();
            if(document.getElementById('memberSelect').value) loadMemberView();
        });
    }

    // [핵심] 선 반영 후 저장 함수
    async function updateStatus(name, routine, status, targetDate = getNowInfo().todayStr) {
        // 1. 화면 UI를 즉시 업데이트 (로딩 없이)
        db = db.filter(d => !(d.date.includes(targetDate) && d.name === name && d.routine === routine));
        if (status !== '대기') db.push({ date: targetDate, name, routine, status });
        
        loadMemberView();
        renderAdminTable();
        showToast("저장 중...");

        // 2. 서버 통신은 백그라운드에서 실행
        try {
            await fetch(SHEET_API_URL, { method: 'POST', body: JSON.stringify({ date: targetDate, name, routine, status }) });
            showToast("저장 완료! ✅");
        } catch (e) {
            showToast("연동 오류 ❌");
        }
    }

    function switchTab(mode) {
        if(mode === 'admin') {
            const pw = prompt("관리자 비밀번호");
            if(pw !== ADMIN_PW) return;
        }
        document.getElementById('memberSection').style.display = mode === 'member' ? 'block' : 'none';
        document.getElementById('adminSection').style.display = mode === 'admin' ? 'block' : 'none';
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (mode==='member'&&i===0)||(mode==='admin'&&i===1)));
    }

    function getStatus(name, date, routine) {
        const found = db.filter(d => d.name == name && d.routine == routine && d.date.includes(date));
        return found.length > 0 ? found[found.length - 1].status : '대기';
    }

    function loadMemberView() {
        const name = document.getElementById('memberSelect').value;
        if(!name) return;
        const { todayStr, currentDay } = getNowInfo();
        document.getElementById('memberFocusArea').style.display = 'block';
        document.getElementById('focusName').innerText = `👋 ${name}님`;
        const note = MEMBER_DATA[name].note;
        document.getElementById('specialNoteArea').innerHTML = note ? `<div style="background:#FFF9E6; color:#D35400; padding:10px; border-radius:8px; font-weight:800;">📌 ${note}</div>` : '';
        
        const list = document.getElementById('routineList');
        list.innerHTML = `<p style="font-weight:900; margin-top:20px;">오늘(${todayStr})의 체크</p>`;
        
        MEMBER_DATA[name].items.forEach(r => {
            const s = getStatus(name, todayStr, r);
            list.innerHTML += `<div class="routine-item"><span class="routine-name">${r}</span><div class="btn-group"><button class="btn O ${s==='O'?'active':''}" onclick="updateStatus('${name}','${r}','O')">O</button><button class="btn X ${s==='X'?'active':''}" onclick="updateStatus('${name}','${r}','X')">X</button><button class="btn P ${s==='-'?'active':''}" onclick="updateStatus('${name}','${r}','-')">-</button></div></div>`;
        });

        const myRoutines = MEMBER_DATA[name].items;
        let oCount = 0, pCount = 0;
        let html = `<thead><tr><th>날짜</th>${myRoutines.map(r => `<th>${r.substring(0,2)}</th>`).join('')}</tr></thead><tbody>`;
        for(let d=1; d<=30; d++) {
            const dStr = `2026-04-${String(d).padStart(2, '0')}`;
            html += `<tr><td>${d}일</td>`;
            myRoutines.forEach(r => {
                const s = getStatus(name, dStr, r);
                if(d <= currentDay) { if(s==='O') oCount++; if(s==='-') pCount++; }
                html += `<td style="color:${s==='O'?'var(--success)':(s==='X'?'var(--fail)':'#777')}">${s==='대기'?'':s}</td>`;
            });
            html += `</tr>`;
        }
        document.getElementById('myDetailTable').innerHTML = html + `</tbody>`;
        const total = (currentDay * myRoutines.length) - pCount;
        document.getElementById('myRateInfo').innerText = `🎯 성취율: ${total > 0 ? Math.round((oCount/total)*100) : 0}%`;
    }

    function renderAdminTable() {
        const table = document.getElementById('adminTable');
        if (!table) return;
        const { currentDay } = getNowInfo();
        let html = `<thead><tr><th class="sticky-col">성함</th><th>항목</th>`;
        for(let d=1; d<=30; d++) html += `<th>${d}</th>`;
        html += `<th>%</th></tr></thead><tbody>`;

        Object.keys(MEMBER_DATA).forEach(name => {
            const myRoutines = MEMBER_DATA[name].items;
            myRoutines.forEach((r, idx) => {
                let rO = 0, rP = 0;
                html += `<tr>`;
                if(idx === 0) html += `<td class="sticky-col" rowspan="${myRoutines.length}">${name}</td>`;
                html += `<td style="text-align:left; font-size:11px;">${r}</td>`;
                for(let d=1; d<=30; d++) {
                    const dStr = `2026-04-${String(d).padStart(2, '0')}`;
                    const s = getStatus(name, dStr, r);
                    if(d <= currentDay) { if(s==='O') rO++; if(s==='-') rP++; }
                    html += `<td onclick="adminQuickEdit('${name}','${r}','${dStr}')" style="cursor:pointer; background:${d==currentDay?'#FFF9E6':''}; color:${s==='O'?'var(--success)':(s==='X'?'var(--fail)':'#999')}">${s==='대기'?'':s}</td>`;
                }
                html += `<td style="background:#f0f7ff;">${Math.round((rO / (currentDay - rP)) * 100) || 0}%</td></tr>`;
            });
        });
        table.innerHTML = html + `</tbody>`;
    }

    function adminQuickEdit(name, routine, date) {
        const cur = getStatus(name, date, routine);
        const next = cur === 'O' ? 'X' : (cur === 'X' ? '-' : (cur === '-' ? '대기' : 'O'));
        updateStatus(name, routine, next, date);
    }

    init();
</script>
</body>
</html>
